name: Release .deb Package

on:
  # push:
  #   tags:
  #     - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0)"
        required: true
        default: "0.1.0"

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
      PKG: flux-agent_${{ inputs.version }}_amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o flux-agent .

      - name: Build .deb package
        run: |
          mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/lib/tmpfiles.d" "${PKG}/lib/systemd/system"

          install -Dm755 flux-agent         "${PKG}/usr/local/bin/flux-agent"
          install -Dm644 example.agent.yaml "${PKG}/etc/flux-agent/agent.yaml.example"

          cat > "${PKG}/DEBIAN/control" <<-EOF
          	Package: flux-agent
          	Version: ${VERSION}
          	Architecture: amd64
          	Maintainer: WraithBytes <noreply@wraithbytes.dev>
          	Depends: libc6
          	Section: utils
          	Priority: optional
          	Description: Serverless Fabric agent daemon
          	 Worker node for the Serverless Fabric platform. Executes
          	 serverless functions under cgroup v2 memory limits using
          	 a dedicated unprivileged system user (flux-runner).
          EOF

          cat > "${PKG}/DEBIAN/postinst" <<-'EOF'
          	#!/bin/bash
          	set -e
          	if ! id flux-runner &>/dev/null; then
          	  useradd --system --no-create-home --shell /usr/sbin/nologin \
          	    --comment "Serverless Fabric function runner" flux-runner
          	fi
          	systemctl daemon-reload || true
          EOF
          chmod 0755 "${PKG}/DEBIAN/postinst"

          echo "d /sys/fs/cgroup/flux 0755 root root -" > "${PKG}/usr/lib/tmpfiles.d/flux-agent.conf"

          cat > "${PKG}/lib/systemd/system/flux-agent.service" <<-'EOF'
          	[Unit]
          	Description=Serverless Fabric Agent
          	Documentation=https://github.com/wraithbytes/serverless-fabric
          	After=network.target

          	[Service]
          	Type=simple
          	ExecStart=/usr/local/bin/flux-agent
          	WorkingDirectory=/etc/flux-agent
          	Restart=on-failure
          	RestartSec=5s
          	User=root

          	[Install]
          	WantedBy=multi-user.target
          EOF

          dpkg-deb --build --root-owner-group "${PKG}"

      - name: Create GitHub Release and upload .deb
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "flux-agent v${{ env.VERSION }}"
          generate_release_notes: true
          files: "*.deb"
